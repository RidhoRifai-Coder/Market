<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PoyStore – Winter Avengers Edition</title>

<style>
*{box-sizing:border-box;font-family:'Segoe UI',sans-serif}
body{
    margin:0;
    background:linear-gradient(180deg,#020617,#020024,#000);
    overflow-x:hidden;
    color:white;
}

/* SALJU */
.snow{
    position:fixed;inset:0;pointer-events:none;
    background-image:
     radial-gradient(3px 3px at 20px 30px, white 100%, transparent),
     radial-gradient(4px 4px at 60px 90px, white 100%, transparent),
     radial-gradient(2px 2px at 100px 140px, white 100%, transparent),
     radial-gradient(2px 2px at 150px 40px, white 100%, transparent),
     radial-gradient(2px 2px at 200px 180px, white 100%, transparent),
     radial-gradient(2px 2px at 260px 120px, white 100%, transparent),
     radial-gradient(3px 3px at 320px 200px, white 100%, transparent),
     radial-gradient(2px 2px at 380px 60px, white 100%, transparent);

    background-size:400px 400px;
    animation:snowFall 10s linear infinite;
    opacity:.8;
}
@keyframes snowFall{
    from{background-position:0 -400px}
    to{background-position:0 400px}
}

/* HEADER */
header{
    background:linear-gradient(to right,#416878,#203a43,#2c5364);
    padding:18px;
    text-align:center;
    font-size:26px;
    font-weight:bold;
    box-shadow:0 4px 15px rgba(0,0,0,.8);
}
#typing{
    color:#38bdf8;
    border-right:2px solid #38bdf8;
    padding-right:6px;
    animation:blink .8s infinite;
}
@keyframes blink{50%{border-color:transparent}}

.container{max-width:1100px;margin:auto;padding:16px}
.menu{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:18px;
}

/* CARD NEON */
.card{
    position:relative;
    background:rgba(0,255,255,.08);
    border-radius:18px;
    padding:14px;
    text-align:center;
    box-shadow:0 0 12px #22d3ee,0 0 26px rgba(34,211,238,.7);
    transition:.3s;
}
.card:hover{
    transform:translateY(-6px) scale(1.03);
    box-shadow:0 0 20px #38bdf8,0 0 45px rgba(56,189,248,.9);
}
.hero-img{
    position:absolute;top:10px;right:10px;
    width:60px;height:60px;border-radius:50%;
    border:2px solid #22d3ee;object-fit:cover;
}
.product{
    width:100%;height:170px;object-fit:cover;
    border-radius:14px;border:2px solid #38bdf8;
}
.price{color:#22d3ee;font-weight:bold}
.stock{font-size:14px;color:#ccc}
select{
    width:100%;padding:6px;border-radius:8px;border:none;margin:6px 0;
}

.controls{
    display:flex;justify-content:center;gap:12px;margin-top:8px
}
.controls button{
    padding:6px 14px;border:none;border-radius:8px;
    background:#0ea5e9;color:white;font-size:18px;cursor:pointer;
}

/* SOLD */
.sold{opacity:.4;pointer-events:none}
.sold::after{
    content:"SOLD OUT";
    position:absolute;top:12px;left:12px;
    background:red;padding:6px 10px;
    border-radius:6px;font-size:12px;font-weight:bold;
}

.total{
    margin-top:20px;text-align:center;
    font-size:22px;font-weight:bold;color:#38bdf8;
}
.order-btn{
    width:100%;margin-top:12px;padding:14px;
    font-size:18px;border:none;border-radius:14px;cursor:pointer;
}
.order{background:linear-gradient(to right,#0ea5e9,#38bdf8);color:white}
.admin{background:#020617;color:white}

.snow-icon{
    position:absolute;
    top:10px;
    right:12px;
    font-size:26px;
    animation:spinSnow 6s linear infinite;
    filter:drop-shadow(0 0 6px #38bdf8);
    opacity:.9;
}

@keyframes spinSnow{
    from{transform:rotate(0deg)}
    to{transform:rotate(360deg)}
}

</style>
</head>

<body>
<div class="snow"></div>

<header><span id="typing"></span></header>

<div class="container">
<div class="menu">

<!-- 1 -->
<div class="card" data-name="Basreng Pedas" data-price="5000" data-stock="0">
<div class="snow-icon">❄️</div>
<img src="basreng_pedas.jpg" class="product">
<h3>Basreng Pedas</h3>
<div class="price">Rp 5.000</div>
<div class="stock">Stok: 0</div>
<div class="controls"><button onclick="changeQty(this,-1)">-</button><span>0</span><button onclick="changeQty(this,1)">+</button></div>
</div>

<!-- 2 -->
<div class="card" data-name="Basreng Original" data-price="5000" data-stock="0">
<div class="snow-icon">❄️</div>
<img src="basreng_ori.jpg" class="product">
<h3>Basreng Original</h3>
<div class="price">Rp 5.000</div>
<div class="stock">Stok: 0</div>
<div class="controls"><button onclick="changeQty(this,-1)">-</button><span>0</span><button onclick="changeQty(this,1)">+</button></div>
</div>

<!-- 3 -->
<div class="card" data-name="Kentang Goreng" data-price="3000" data-stock="10">
<div class="snow-icon">❄️</div>
<img src="kentang.webp" class="product">
<h3>Kentang Goreng</h3>
<div class="price">Rp 3.000</div>
<div class="stock">Stok: 10</div>
<div class="controls"><button onclick="changeQty(this,-1)">-</button><span>0</span><button onclick="changeQty(this,1)">+</button></div>
</div>

<!-- 4 -->
<div class="card" data-name="Keripik Pangsit" data-price="3000" data-stock="0">
<div class="snow-icon">❄️</div>
<img src="pangsit.webp" class="product">
<h3>Keripik Pangsit</h3>
<select><option>Balado</option><option>Keju</option><option>BBQ</option></select>
<div class="price">Rp 3.000</div>
<div class="stock">Stok: 0</div>
<div class="controls"><button onclick="changeQty(this,-1)">-</button><span>0</span><button onclick="changeQty(this,1)">+</button></div>
</div>

<!-- 5 -->
<div class="card" data-name="Kwetiau" data-price="3000" data-stock="0">
<div class="snow-icon">❄️</div>
<img src="kwetiauw.jpg" class="product">
<h3>Kwetiau</h3>
<select><option>Original</option><option>Pedas</option></select>
<div class="price">Rp 3.000</div>
<div class="stock">Stok: 0</div>
<div class="controls"><button onclick="changeQty(this,-1)">-</button><span>0</span><button onclick="changeQty(this,1)">+</button></div>
</div>

<!-- 6 -->
<div class="card" data-name="Naget Tahu" data-price="3000" data-stock="0">
<div class="snow-icon">❄️</div>
<img src="naget_tahu.jpg" class="product">
<h3>Naget Tahu</h3>
<div class="price">Rp 3.000</div>
<div class="stock">Stok: 0</div>
<div class="controls"><button onclick="changeQty(this,-1)">-</button><span>0</span><button onclick="changeQty(this,1)">+</button></div>
</div>

<!-- 7 -->
<div class="card" data-name="Makaroni" data-price="3000" data-stock="0">
<div class="snow-icon">❄️</div>
<img src="makaroni.jpg" class="product">
<h3>Makaroni</h3>
<select><option>Original</option><option>Pedas</option></select>
<div class="price">Rp 3.000</div>
<div class="stock">Stok: 0</div>
<div class="controls"><button onclick="changeQty(this,-1)">-</button><span>0</span><button onclick="changeQty(this,1)">+</button></div>
</div>

</div>

<div class="total">Total: Rp <span id="total">0</span></div>
<button class="order-btn order" onclick="sendWA()">Pesan via WhatsApp</button>
<button class="order-btn admin" onclick="resetStock()">Reset Stok</button>
</div>

<script>
document.querySelectorAll(".card").forEach(c=>{
    if(parseInt(c.dataset.stock)===0)c.classList.add("sold");
});

function changeQty(btn, val){
    const card = btn.closest(".card");
    if(card.classList.contains("sold")) return;

    const spanQty = card.querySelector(".controls span");
    let qty = parseInt(spanQty.innerText);
    const stok = parseInt(card.dataset.stock);

    qty += val;

    // batas bawah & atas
    if(qty < 0) qty = 0;
    if(qty > stok){
        alert("Stok tidak mencukupi ❄️");
        qty = stok;
    }

    spanQty.innerText = qty;
    updateTotal();
}
function updateTotal(){
    let t=0;
    document.querySelectorAll(".card").forEach(c=>{
        t+=parseInt(c.querySelector(".controls span").innerText)*parseInt(c.dataset.price);
    });
    document.getElementById("total").innerText=t;
}
function sendWA(){
    let pesan = "❄️ *PESANAN POYSTORE* ❄️%0A%0A";
    let total = 0;
    let adaPesanan = false;

    document.querySelectorAll(".card").forEach(c=>{
        const qty = parseInt(c.querySelector(".controls span").innerText);
        if(qty > 0){
            adaPesanan = true;
            const nama = c.dataset.name;
            const harga = parseInt(c.dataset.price);
            let varian = "";

            // ambil varian kalau ada select
            const select = c.querySelector("select");
            if(select){
                varian = " (" + select.value + ")";
            }

            pesan += `• ${nama}${varian} x${qty} = Rp ${harga*qty}%0A`;
            total += harga * qty;
        }
    });

    if(!adaPesanan){
        alert("Belum ada pesanan 😅");
        return;
    }

    pesan += `%0A*Total: Rp ${total}*%0A%0A`;
    pesan += "Terima kasih 🙏";

    const nomorWA = "62895366635470"; // GANTI NOMOR WA TUJUAN
    const url = `https://wa.me/${nomorWA}?text=${pesan}`;
    window.open(url, "_blank");

}


const text = "❄ Selamat Datang di PoyShop ❄";
const typingEl = document.getElementById("typing");
let index = 0;
let isDeleting = false;

function typeLoop(){
    if(!isDeleting){
        // MENGETIK
        typingEl.innerHTML = text.substring(0, index + 1);
        index++;
        if(index === text.length){
            setTimeout(() => isDeleting = true, 2000); // diam 2 detik
        }
    } else {
        // MENGHAPUS
        typingEl.innerHTML = text.substring(0, index - 1);
        index--;
        if(index === 0){
            isDeleting = false;
        }
    }
}

setInterval(typeLoop, 120);   // kecepatan ketik

</script>

</body>
</html>
